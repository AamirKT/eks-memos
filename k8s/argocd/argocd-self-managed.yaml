apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-cd
  namespace: argo-cd
spec:
  project: default

  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 9.7.1

    helm:
      values: |
        configs:
          params:
            server.insecure: true
          cm:
            url: https://argocd.aamir-memos.co.uk
          rbac:
            policy.default: role:read-only

        server:
          service:
            type: ClusterIP
            servicePortHttp: 80
            servicePortHttps: 443

          ingress:
            enabled: true
            ingressClassName: traefik
            hostname: argocd.aamir-memos.co.uk
            path: /
            pathType: Prefix

            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
              traefik.ingress.kubernets.io/service.scheme: http
              traefik.ingress.kubernetes.io/servertransport: insecure@internal
              cert-manager.io/cluster-issuer: letsencrypt-prod

            tls:
              - hosts:
                  - argocd.aamir-memos.co.uk
                secretName: argocd-server-tls

  destination:
    server: https://kubernetes.default.svc
    namespace: argo-cd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true