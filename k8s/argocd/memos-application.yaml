apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: memos
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: 'https://github.com/AamirKT/eks-memos.git'
    targetRevision: main
    path: k8s/app
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: memos
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
       - CreateNamespace=true