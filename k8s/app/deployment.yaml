apiVersion: apps/v1
kind: Deployment
metadata:
  name: memos
  namespace: memos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: memos
  template:
    metadata:
      labels:
        app: memos
    spec:
      serviceAccountName: memos-sa
      containers:
        - name: memos
          image: 657672948849.dkr.ecr.eu-west-2.amazonaws.com/memos-ecr:da4330b
          ports:
            - containerPort: 8081
          env:
             - name: MEMOS_ADDR
               value: "0.0.0.0"
             - name: MEMOS_PORT
               value: "8081"
             - name: MEMOS_DRIVER
               value: "postgres"
             - name: MEMOS_DSN
               valueFrom:
                  secretKeyRef:
                    name: memos-db-secret
                    key: MEMOS_DSN
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
                  
            limits:
              cpu: "500m"
              memory: "512Mi"
                    