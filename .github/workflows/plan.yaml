name: Terraform Plan

on:
    workflow_run:
        workflows: ["Build and Deploy"]
        types:
          - completed
    workflow_dispatch:

concurrency:
    group: terraform-plan
    cancel-in-progress: true

env:
    AWS_REGION: eu-west-2
    TF_VAR_route53_zone_id: ${{ vars.ROUTE53_ZONE_ID }}
    TF_VAR_domain_name: ${{ vars.DOMAIN_NAME }}

jobs:
    terraform-plan:
        runs-on: ubuntu-latest
        if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

        permissions:
            contents: read
            id-token: write
            actions: read

        steps:
        - name: Checkout code
          uses: actions/checkout@v4
          with:
            ref: ${{ github.event.workflow_run.head_sha || github.sha }}

        - name: Configure AWS credentials via OIDC
          uses: aws-actions/configure-aws-credentials@v4
          with:
            role-to-assume: ${{ secrets.TERRAFORM_PLAN_ROLE }}
            aws-region: ${{ env.AWS_REGION }}
            role-session-name: terraform-plan

        - name: Setup TFLint
          uses: terraform-linters/setup-tflint@v6
          with:
            tflint_version: v0.56.0

        - name: Init TFLint
          working-directory: terraform
          run: tflint --init

        - name: Run TFLint
          working-directory: terraform
          run: tflint

        - name: Setup Checkov
          uses: bridgecrewio/checkov-action@v12
          with:
            directory: terraform
            soft_fail: true

        - name: Setup Terraform
          uses: hashicorp/setup-terraform@v4
          with:
            terraform_version: 1.15.0

        - name: Terraform Init
          working-directory: terraform
          run: terraform init

        - name: Show backend info
          run: terraform init -reconfigure -backend-config=""
          working-directory: terraform

        - name: Terraform format
          working-directory: terraform
          run: terraform fmt -check

        - name: Terraform Validate
          working-directory: terraform
          run: terraform validate

        - name: Debug state
          run: terraform state list
          working-directory: terraform

        - name: Debug Kubernetes access
          run: |
            aws eks update-kubeconfig \
            --region eu-west-2 \
            --name memos-eks-cluster

            kubectl get ns
            helm list -A

        - name: Terraform Plan
          working-directory: terraform
          run: terraform plan -input=false -lock-timeout=2m -out=tfplan

        - name: Upload Terraform Plan
          uses: actions/upload-artifact@v4
          with:
            name: terraform-plan
            path: terraform/tfplan